<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>a.lifeofbrooklyn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
            height: 100vh;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Background Accordion Effect --- */
        .manga-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .manga-panel {
            flex: 1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: flex 0.6s cubic-bezier(0.25, 1, 0.5, 1), filter 0.6s ease;
            position: relative;
            filter: grayscale(80%) brightness(40%);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 50px;
        }

        .manga-panel:hover {
            flex: 3;
            filter: grayscale(0%) brightness(80%);
        }

        .manga-panel::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
            pointer-events: none;
        }

        .manga-title {
            font-family: 'Cinzel', serif;
            color: white;
            font-size: 1.5rem;
            letter-spacing: 3px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            transition-delay: 0.1s;
            z-index: 2;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
            text-transform: uppercase;
        }

        .manga-panel:hover .manga-title {
            opacity: 1;
            transform: translateY(0);
        }

        /* อัปเดตลิงก์รูปภาพตามที่ให้มา */
        .panel-1 { background-image: url('https://i.pinimg.com/736x/6d/0b/0b/6d0b0b79cc40a84c4caae3c9be870593.jpg'); } /* Berserk */
        .panel-2 { background-image: url('https://i.pinimg.com/564x/49/bf/63/49bf63c6f7f6949b8f37d738b3a94dfb.jpg'); } /* Vagabond */
        .panel-3 { background-image: url('https://i.pinimg.com/736x/c8/81/a1/c881a140ea1e3af99e938d6636de7133.jpg'); } /* Vinland Saga */
        .panel-4 { background-image: url('https://picfiles.alphacoders.com/645/645529.jpeg'); } /* The Climber */


        /* --- Glassmorphism Center Card --- */
        .glass-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 15, 15, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            z-index: 10;
            width: 90%;
            max-width: 400px;
            animation: fadeInCard 1.5s ease-out forwards;
        }

        .glass-card h1 {
            font-family: 'Cinzel', serif;
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .glass-card p {
            color: #ccc;
            font-size: 0.9rem;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .ig-btn {
            display: inline-block;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .ig-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(220, 39, 67, 0.4);
        }

        @keyframes fadeInCard {
            0% { opacity: 0; transform: translate(-50%, -40%); }
            100% { opacity: 1; transform: translate(-50%, -50%); }
        }

        @media (max-width: 768px) {
            .manga-container {
                flex-direction: column;
            }
            .manga-panel {
                align-items: center;
                padding-bottom: 0;
            }
            .manga-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="manga-container">
        <div class="manga-panel panel-1">
            <h2 class="manga-title">Berserk</h2>
        </div>
        <div class="manga-panel panel-2">
            <h2 class="manga-title">Vagabond</h2>
        </div>
        <div class="manga-panel panel-3">
            <h2 class="manga-title">Vinland Saga</h2>
        </div>
        <div class="manga-panel panel-4">
            <h2 class="manga-title">The Climber</h2>
        </div>
    </div>

    

</body>
</html>
